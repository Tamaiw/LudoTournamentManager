services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ludo_tournament
      POSTGRES_USER: ludo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-uuid-extension.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://ludo:${DB_PASSWORD:-changeme}@postgres:5432/ludo_tournament
      - JWT_SECRET=${JWT_SECRET:-fallback-secret-for-dev-only}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: